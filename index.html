<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Background Remover - 100% Browser-based</title>
    <style>
        /* Basic CSS replacement for Tailwind - no CDN dependency */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #f3f4f6;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .container {
            max-width: 72rem;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        h1 {
            font-size: 2.25rem;
            font-weight: bold;
            text-align: center;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }
        .text-center { text-align: center; }
        .text-gray-600 { color: #4b5563; }
        .text-gray-800 { color: #1f2937; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .mb-8 { margin-bottom: 2rem; }
        .mt-4 { margin-top: 1rem; }
        .mt-6 { margin-top: 1.5rem; }
        .mt-8 { margin-top: 2rem; }
        .mt-12 { margin-top: 3rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
        .p-4 { padding: 1rem; }
        .p-12 { padding: 3rem; }
        .border-2 { border-width: 2px; }
        .border-dashed { border-style: dashed; }
        .border-gray-400 { border-color: #9ca3af; }
        .rounded-lg { border-radius: 0.5rem; }
        .bg-white { background-color: white; }
        .bg-blue-500 { background-color: #3b82f6; }
        .hover\:bg-blue-600:hover { background-color: #2563eb; }
        .text-white { color: white; }
        .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
        .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .cursor-pointer { cursor: pointer; }
        .transition-colors { transition: background-color 0.2s; }
        .hidden { display: none !important; }
        .w-full { width: 100%; }
        .max-w-md { max-width: 28rem; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        .bg-gray-200 { background-color: #e5e7eb; }
        .h-2\\.5 { height: 0.625rem; }
        .rounded-full { border-radius: 9999px; }
        .bg-blue-500 { background-color: #3b82f6; }
        .w-0 { width: 0; }
        .transition-all { transition: all 0.3s; }
        .grid { display: grid; }
        .gap-6 { gap: 1.5rem; }
        .md\\:grid-cols-2 { @media (min-width: 768px) { grid-template-columns: repeat(2, 1fr); } }
        .xl\\:grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
        .text-xl { font-size: 1.25rem; }
        .font-semibold { font-weight: 600; }
        .text-gray-700 { color: #374151; }
        .shadow { box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06); }
        .min-h-\\[300px\\] { min-height: 300px; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .bg-repeat { background-repeat: repeat; }
        .inline-block { display: inline-block; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .h-12 { height: 3rem; }
        .w-12 { width: 3rem; }
        .border-b-2 { border-bottom-width: 2px; }
        .border-blue-600 { border-color: #2563eb; }
        .text-sm { font-size: 0.875rem; }
        .text-gray-500 { color: #6b7280; }
        .inlined-grid { display: grid; grid-template-columns: 1fr; }
        @media (min-width: 768px) { .inlined-grid { grid-template-columns: repeat(2, 1fr); } }
        .bg-green-500 { background-color: #10b981; }
        .hover\\:bg-green-600:hover { background-color: #059669; }
        .bg-gray-500 { background-color: #6b7280; }
        .hover\\:bg-gray-600:hover { background-color: #4b5563; }
        .ml-4 { margin-left: 1rem; }
        .items-center { align-items: center; }
        .gap-2 { gap: 0.5rem; }
        .inline-flex { display: inline-flex; }
        .px-8 { padding-left: 2rem; padding-right: 2rem; }
        .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
        .font-medium { font-weight: 500; }
        .max-w-full { max-width: 100%; }
        .h-auto { height: auto; }
        .rounded { border-radius: 0.25rem; }
        .text-gray-500 { color: #6b7280; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <h1 class="text-4xl font-bold text-center text-gray-800 mb-2">AI Background Remover</h1>
        <p class="text-center text-gray-600 mb-8">100% browser-based processing, no uploads, privacy-first</p>
        
        <div id="dropZone" class="border-2 border-dashed border-gray-400 rounded-lg p-12 text-center bg-white mb-6 hover:border-blue-500 transition-colors cursor-pointer">
            <p class="text-gray-600 mb-2">Drag & drop an image here, or</p>
            <button id="selectBtn" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition-colors">Select Image</button>
            <input type="file" id="fileInput" accept="image/*" class="hidden">
            <p class="text-sm text-gray-500 mt-4">Supports JPG, PNG up to 10MB</p>
        </div>

        <div id="loadingSection" class="hidden text-center py-8">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
            <p id="loadingText" class="text-gray-600">Loading model...</p>
            <div class="w-full max-w-md mx-auto bg-gray-200 rounded-full h-2.5 mt-4">
                <div id="progressBar" class="bg-blue-500 h-2.5 rounded-full w-0 transition-all duration-300"></div>
            </div>
        </div>

        <div id="resultSection" class="hidden inlined-grid gap-6">
            <div>
                <h3 class="text-xl font-semibold mb-3 text-gray-700">Original</h3>
                <div id="originalContainer" class="bg-white rounded-lg p-4 shadow min-h-[300px] flex items-center justify-center"></div>
            </div>
            <div>
                <h3 class="text-xl font-semibold mb-3 text-gray-700">Result</h3>
                <div id="resultContainer" class="bg-white rounded-lg p-4 shadow min-h-[300px] flex items-center justify-center bg-repeat" style="background-image: url('https://pic.imgdb.cn/item/66049ac0f21886ccc077d44d.png')">
                </div>
            </div>
        </div>

        <div id="actionButtons" class="hidden text-center mt-6">
            <button id="downloadBtn" class="bg-green-500 text-white px-8 py-3 rounded-lg hover:bg-green-600 transition-colors inline-flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                Download PNG
            </button>
            <button id="newImageBtn" class="bg-gray-500 text-white px-8 py-3 rounded-lg hover:bg-gray-600 transition-colors ml-4">
                New Image
            </button>
        </div>

        <footer class="mt-12 text-center text-gray-500 text-sm">
            <p>Powered by rembg + ONNX Runtime Web • Runs entirely in your browser</p>
        </footer>
    </div>

    <!-- ONNX Runtime Web - use jsdelivr with correct path -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js"></script>
    <script>
        // Configuration
        // Model is included in the repo, loaded from same domain (no CORS issues)
        const MODEL_URL = './u2netp.onnx';
        
        // Global variables
        let model = null;
        let session = null;
        let ort = window.ort;
        
        // DOM elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const selectBtn = document.getElementById('selectBtn');
        const loadingSection = document.getElementById('loadingSection');
        const loadingText = document.getElementById('loadingText');
        const progressBar = document.getElementById('progressBar');
        const resultSection = document.getElementById('resultSection');
        const actionButtons = document.getElementById('actionButtons');
        const originalContainer = document.getElementById('originalContainer');
        const resultContainer = document.getElementById('resultContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const newImageBtn = document.getElementById('newImageBtn');

        // Initialize
        (async function init() {
            console.log('Initializing ONNX Runtime...');
            ort.env.wasm.numThreads = navigator.hardwareConcurrency || 2;
            ort.env.wasm.simd = false; // Disable SIMD for broader compatibility
            
            // Configure WASM path - must end with slash
            // Explicitly force non-SIMD build name
            if (typeof ort !== 'undefined' && ort.env && ort.env.wasm) {
                ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/';
                // Override the WASM file name to ensure we use non-simd
                ort.env.wasm.wasmBinary = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort-wasm.wasm';
            }
            console.log('WASM paths configured:', ort.env.wasm.wasmPaths);
            console.log('WASM binary:', ort.env.wasm.wasmBinary);
            
            // Ensure correct initial state:
            // - Show loading section while downloading model
            // - Hide dropZone during model download
            loadingSection.classList.remove('hidden');
            dropZone.classList.add('hidden');
            
            try {
                loadingText.textContent = 'Loading AI model...';
                console.log('Starting model download from:', MODEL_URL);
                const response = await fetch(MODEL_URL);
                console.log('Fetch response:', response.status, response.statusText);
                if (response.ok) {
                    const reader = response.body.getReader();
                    const contentLength = +response.headers.get('Content-Length');
                    console.log('Content length:', contentLength);
                    let receivedLength = 0;
                    let chunks = [];
                    
                    while(true) {
                        const {done, value} = await reader.read();
                        if (done) break;
                        chunks.push(value);
                        receivedLength += value.length;
                        const percent = contentLength ? (receivedLength / contentLength * 100).toFixed(0) : 50;
                        progressBar.style.width = percent + '%';
                        loadingText.textContent = `Downloading model: ${percent}% (${(receivedLength/1024/1024).toFixed(1)}MB)`;
                    }
                    
                    console.log('Download complete, creating blob...');
                    const blob = new Blob(chunks);
                    const arrayBuffer = await blob.arrayBuffer();
                    loadingText.textContent = 'Initializing model...';
                    console.log('Creating inference session...');
                    session = await ort.InferenceSession.create(arrayBuffer);
                    model = session;
                    loadingSection.classList.add('hidden');
                    dropZone.classList.remove('hidden');
                    console.log('✅ Model loaded successfully! Input names:', session.inputNames);
                    console.log('✅ Output names:', session.outputNames);
                } else {
                    throw new Error(`Failed to download model: ${response.status} ${response.statusText}`);
                }
            } catch (e) {
                console.error('❌ Error loading model:', e);
                loadingText.textContent = 'Failed to load model. Please refresh and try again. Error: ' + e.message;
                // Don't keep loading screen forever, show upload area so user can at least try again
                setTimeout(() => {
                    loadingSection.classList.add('hidden');
                    dropZone.classList.remove('hidden');
                }, 5000);
            }
        })();

        // Bind event listeners immediately - don't wait for model to load
        // This ensures buttons work even if model is still loading or fails

        // Event listeners
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-blue-500');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                processFile(files[0]);
            }
        });

        selectBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                processFile(e.target.files[0]);
            }
        });

        newImageBtn.addEventListener('click', () => {
            resultSection.classList.add('hidden');
            actionButtons.classList.add('hidden');
            dropZone.classList.remove('hidden');
            fileInput.value = '';
        });

        downloadBtn.addEventListener('click', () => {
            const canvas = resultContainer.querySelector('canvas');
            if (!canvas) return;
            const link = document.createElement('a');
            link.download = 'removed-background.png';
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
            }, 'image/png');
        });

        async function processFile(file) {
            if (!session) {
                alert('Model is still loading, please wait...');
                return;
            }

            dropZone.classList.add('hidden');
            loadingSection.classList.remove('hidden');
            loadingText.textContent = 'Processing image...';
            progressBar.style.width = '100%';
            console.log('Starting to process file:', file.name, file.size + ' bytes');

            // Load original image
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    // Show original
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = async () => {
                        try {
                            console.log('Image loaded:', img.width + 'x' + img.height);
                            originalContainer.innerHTML = '';
                            const scaledImg = document.createElement('img');
                            scaledImg.src = img.src;
                            scaledImg.className = 'max-w-full h-auto rounded';
                            originalContainer.appendChild(scaledImg);

                            console.log('Starting background removal...');
                            loadingText.textContent = 'Running AI inference...';
                            // Process image
                            const resultCanvas = await removeBackground(img);
                            
                            console.log('Background removal complete');
                            // Show result
                            resultContainer.innerHTML = '';
                            resultContainer.appendChild(resultCanvas);
                            
                            resultSection.classList.remove('hidden');
                            actionButtons.classList.remove('hidden');
                            loadingSection.classList.add('hidden');
                        } catch (processingError) {
                            console.error('❌ Error during processing:', processingError);
                            loadingText.textContent = 'Error processing image: ' + processingError.message;
                            alert('Processing failed: ' + processingError.message);
                        }
                    };
                    img.onerror = function() {
                        console.error('Failed to load image');
                        loadingText.textContent = 'Failed to load image';
                        alert('Failed to load image');
                    };
                    img.src = e.target.result;
                } catch (error) {
                    console.error('❌ Error in processFile:', error);
                    loadingText.textContent = 'Error: ' + error.message;
                    alert('Processing failed: ' + error.message);
                }
            };
            reader.onerror = function() {
                console.error('Failed to read file');
                loadingText.textContent = 'Failed to read file';
                alert('Failed to read file');
            };
            reader.readAsDataURL(file);
        }

        async function removeBackground(img) {
            console.log('Preprocessing image...');
            // Preprocess image
            const [input, origW, origH] = preprocess(img);
            console.log('Preprocessing complete, input size:', input.length);
            
            console.log('Running inference...');
            // Run inference
            const feeds = { input: new ort.Tensor('float32', input, [1, 3, 320, 320]) };
            const results = await session.run(feeds);
            console.log('✅ Inference complete! Available outputs:', Object.keys(results));
            
            // Find the output tensor (different models have different output names)
            let outputKey = Object.keys(results)[0];
            console.log('Using output key:', outputKey);
            const output = results[outputKey].data;
            console.log('Output size:', output.length);
            
            console.log('Postprocessing mask...');
            // Postprocess
            const mask = postprocess(output, origW, origH);
            
            console.log('Applying mask...');
            // Apply mask to original image
            const resultCanvas = applyMask(img, mask);
            console.log('✅ All processing complete!');
            return resultCanvas;
        }

        function preprocess(img) {
            // Resize to 320x320
            const canvas = document.createElement('canvas');
            canvas.width = 320;
            canvas.height = 320;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, 320, 320);
            const imageData = ctx.getImageData(0, 0, 320, 320);
            const data = imageData.data;
            
            // Convert to tensor input [1, 3, 320, 320]
            const input = new Float32Array(1 * 3 * 320 * 320);
            for (let y = 0; y < 320; y++) {
                for (let x = 0; x < 320; x++) {
                    const idx = (y * 320 + x) * 4;
                    const r = data[idx] / 255.0;
                    const g = data[idx + 1] / 255.0;
                    const b = data[idx + 2] / 255.0;
                    // Normalize: mean [0.485, 0.456, 0.406], std [0.229, 0.224, 0.225]
                    input[0 * 320 * 320 + y * 320 + x] = (r - 0.485) / 0.229;
                    input[1 * 320 * 320 + y * 320 + x] = (g - 0.456) / 0.224;
                    input[2 * 320 * 320 + y * 320 + x] = (b - 0.406) / 0.225;
                }
            }
            return [input, img.width, img.height];
        }

        function postprocess(output, origW, origH) {
            // output is [1, 1, 320, 320]
            // Squeeze to [320, 320]
            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = 320;
            maskCanvas.height = 320;
            const ctx = maskCanvas.getContext('2d');
            const imageData = ctx.createImageData(320, 320);
            const data = imageData.data;
            
            for (let y = 0; y < 320; y++) {
                for (let x = 0; x < 320; x++) {
                    const idx = y * 320 + x;
                    const prob = 1.0 / (1.0 + Math.exp(-output[idx]));
                    const v = Math.round(prob * 255);
                    data[idx * 4] = v;
                    data[idx * 4 + 1] = v;
                    data[idx * 4 + 2] = v;
                    data[idx * 4 + 3] = 255;
                }
            }
            ctx.putImageData(imageData, 0, 0);
            
            // Resize to original size
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = origW;
            finalCanvas.height = origH;
            const finalCtx = finalCanvas.getContext('2d');
            finalCtx.drawImage(maskCanvas, 0, 0, 320, 320, 0, 0, origW, origH);
            
            return finalCtx.getImageData(0, 0, origW, origH);
        }

        function applyMask(origImg, maskData) {
            const canvas = document.createElement('canvas');
            canvas.width = origImg.width;
            canvas.height = origImg.height;
            const ctx = canvas.getContext('2d');
            
            // Draw original image
            ctx.drawImage(origImg, 0, 0);
            const origData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const origPixels = origData.data;
            const maskPixels = maskData.data;
            
            // Apply alpha mask
            for (let i = 0; i < origPixels.length; i += 4) {
                // Mask pixel is grayscale, R = alpha
                origPixels[i + 3] = maskPixels[i];
            }
            
            ctx.putImageData(origData, 0, 0);
            return canvas;
        }
    </script>
</body>
