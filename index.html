<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片背景移除 - Remove.bg</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #f8fafc;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #1e293b;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem 3rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            color: #0f172a;
            margin-bottom: 0.75rem;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 1rem;
            margin-bottom: 2.5rem;
        }
        #dropZone {
            border: 2px dashed #cbd5e1;
            border-radius: 0.75rem;
            padding: 4rem 2rem;
            text-align: center;
            background-color: white;
            margin-bottom: 2rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #dropZone:hover {
            border-color: #3b82f6;
            background-color: #f8fafc;
        }
        #dropZone.dragover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        #dropZone .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        #dropZone p {
            color: #475569;
            font-size: 1.125rem;
            margin-bottom: 1rem;
        }
        .btn {
            background-color: #3b82f6;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn:hover {
            background-color: #2563eb;
        }
        .btn-success {
            background-color: #10b981;
        }
        .btn-success:hover {
            background-color: #059669;
        }
        .btn-secondary {
            background-color: #64748b;
        }
        .btn-secondary:hover {
            background-color: #475569;
        }
        #fileInput {
            display: none;
        }
        .hint {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-top: 1rem;
        }
        .hidden {
            display: none !important;
        }
        #loadingSection {
            text-align: center;
            padding: 3rem 0;
        }
        .spinner {
            display: inline-block;
            width: 3rem;
            height: 3rem;
            border: 3px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        #loadingText {
            color: #64748b;
            font-size: 1rem;
        }
        .image-section {
            margin-bottom: 2rem;
        }
        h3 {
            font-size: 1.125rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.75rem;
            padding-left: 0.25rem;
        }
        .image-container {
            background-color: white;
            border-radius: 0.75rem;
            padding: 1rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #resultContainer {
            background-image: url('https://pic.imgdb.cn/item/66049ac0f21886ccc077d44d.png');
            background-repeat: repeat;
        }
        .action-buttons {
            text-align: center;
            margin-top: 2rem;
        }
        .action-buttons .btn {
            padding: 0.875rem 2.5rem;
            font-weight: 500;
            font-size: 1.05rem;
        }
        .action-buttons .btn + .btn {
            margin-left: 1rem;
        }
        .config-note {
            background-color: #f1f5f9;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid #3b82f6;
        }
        .config-note p {
            color: #475569;
            font-size: 0.875rem;
            line-height: 1.5;
        }
        .config-note strong {
            color: #1e293b;
        }
        footer {
            margin-top: 3rem;
            text-align: center;
            color: #94a3b8;
            font-size: 0.875rem;
        }
        footer a {
            color: #3b82f6;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
        .preview-image {
            max-width: 100%;
            max-height: 500px;
            height: auto;
            width: auto;
            object-fit: contain;
            border-radius: 0.25rem;
        }
        @media (max-width: 640px) {
            h1 {
                font-size: 1.5rem;
            }
            #dropZone {
                padding: 2.5rem 1rem;
            }
            .action-buttons .btn + .btn {
                margin-left: 0;
                margin-top: 1rem;
            }
            .action-buttons {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ 图片背景移除</h1>
        <p class="subtitle">一键移除图片背景， Powered by Remove.bg</p>

        <div class="config-note">
            <p><strong>配置说明：</strong>请在下方代码中填入你的 Remove.bg API Key。<br>
            获取 API Key：<a href="https://www.remove.bg/api" target="_blank">https://www.remove.bg/api</a>（注册后可免费使用，每月有免费额度）</p>
        </div>

        <div id="dropZone">
            <div class="icon">📁</div>
            <p>拖拽图片到此处，或点击选择图片</p>
            <button id="selectBtn" class="btn">选择图片</button>
            <input type="file" id="fileInput" accept="image/*" class="hidden">
            <div class="hint">支持 JPG、PNG，最大文件大小 12MB</div>
        </div>

        <div id="loadingSection" class="hidden">
            <div class="spinner"></div>
            <p id="loadingText">正在处理图片...</p>
        </div>

        <div id="resultSection">
            <div class="image-section">
                <h3>原图</h3>
                <div id="originalContainer" class="image-container">
                    <span style="color: #94a3b8;">请上传图片</span>
                </div>
            </div>
            <div class="image-section">
                <h3>处理结果</h3>
                <div id="resultContainer" class="image-container">
                    <span style="color: #94a3b8;">等待处理...</span>
                </div>
            </div>
        </div>

        <div id="actionButtons" class="action-buttons hidden">
            <button id="downloadBtn" class="btn btn-success">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                下载 PNG
            </button>
            <button id="newImageBtn" class="btn btn-secondary">重新上传</button>
        </div>

        <footer>
            <p>Powered by <a href="https://www.remove.bg" target="_blank">remove.bg</a> • 纯前端部署，适用于 Cloudflare Pages</p>
        </footer>
    </div>

    <script>
        (function() {
            'use strict';

            // ========== 请在这里填写你的 Remove.bg API Key ==========
            // 获取地址: https://www.remove.bg/api
            const REMOVE_BG_API_KEY = '3K9RgPY668AueP26K4UzPenL';
            // =========================================================

            // API endpoint
            const REMOVE_BG_API_URL = 'https://api.remove.bg/v1.0/removebg';

            // DOM elements
            const dom = {
                dropZone: document.getElementById('dropZone'),
                fileInput: document.getElementById('fileInput'),
                selectBtn: document.getElementById('selectBtn'),
                loadingSection: document.getElementById('loadingSection'),
                loadingText: document.getElementById('loadingText'),
                resultSection: document.getElementById('resultSection'),
                actionButtons: document.getElementById('actionButtons'),
                originalContainer: document.getElementById('originalContainer'),
                resultContainer: document.getElementById('resultContainer'),
                downloadBtn: document.getElementById('downloadBtn'),
                newImageBtn: document.getElementById('newImageBtn')
            };

            // Current result blob URL for download
            let currentResultUrl = null;

            // Initialize
            function init() {
                // Check API key
                if (!REMOVE_BG_API_KEY || REMOVE_BG_API_KEY.trim() === '') {
                    console.warn('Please set your Remove.bg API Key in the code');
                }

                bindEvents();
            }

            function bindEvents() {
                // Drag and drop
                dom.dropZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dom.dropZone.classList.add('dragover');
                });

                dom.dropZone.addEventListener('dragleave', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dom.dropZone.classList.remove('dragover');
                });

                dom.dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dom.dropZone.classList.remove('dragover');
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        processFile(files[0]);
                    }
                });

                // Click to select
                dom.selectBtn.addEventListener('click', () => {
                    dom.fileInput.click();
                });

                dom.fileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        processFile(e.target.files[0]);
                    }
                });

                // Buttons
                dom.newImageBtn.addEventListener('click', resetForNewImage);
                dom.downloadBtn.addEventListener('click', downloadResult);
            }

            function resetForNewImage() {
                // Revoke previous blob URL to free memory
                if (currentResultUrl) {
                    URL.revokeObjectURL(currentResultUrl);
                    currentResultUrl = null;
                }

                dom.dropZone.classList.remove('hidden');
                dom.actionButtons.classList.add('hidden');
                dom.fileInput.value = '';

                // Clear containers
                dom.originalContainer.innerHTML = '<span style="color: #94a3b8;">请上传图片</span>';
                dom.resultContainer.innerHTML = '<span style="color: #94a3b8;">等待处理...</span>';
            }

            function downloadResult() {
                if (!currentResultUrl) return;

                const link = document.createElement('a');
                link.download = 'background-removed.png';
                link.href = currentResultUrl;
                link.click();
            }

            async function processFile(file) {
                // Validate API key
                if (!REMOVE_BG_API_KEY || REMOVE_BG_API_KEY.trim() === '') {
                    alert('错误：请先在代码中设置 Remove.bg API Key\n\n获取地址：https://www.remove.bg/api');
                    return;
                }

                // Validate file type
                if (!file.type.startsWith('image/')) {
                    alert('请选择一个图片文件');
                    return;
                }

                // Validate file size (12MB max for free tier)
                if (file.size > 12 * 1024 * 1024) {
                    alert('文件大小不能超过 12MB');
                    return;
                }

                // Show original image
                dom.dropZone.classList.add('hidden');
                dom.loadingSection.classList.remove('hidden');
                dom.actionButtons.classList.add('hidden');

                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.crossOrigin = 'anonymous';
                    img.onload = () => {
                        dom.originalContainer.innerHTML = '';
                        img.className = 'preview-image';
                        dom.originalContainer.appendChild(img);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);

                // Send request to remove.bg API
                try {
                    await removeBackground(file);
                } catch (err) {
                    console.error('Processing error:', err);
                    alert('处理失败：' + err.message);
                    resetForNewImage();
                }
            }

            async function removeBackground(file) {
                dom.loadingText.textContent = '正在上传图片并处理...';

                const formData = new FormData();
                formData.append('image_file', file);
                formData.append('size', 'auto');

                const response = await fetch(REMOVE_BG_API_URL, {
                    method: 'POST',
                    headers: {
                        'X-Api-Key': REMOVE_BG_API_KEY.trim()
                    },
                    body: formData
                });

                if (!response.ok) {
                    let errorMsg = `HTTP ${response.status}`;
                    try {
                        const errorJson = await response.json();
                        if (errorJson && errorJson.error) {
                            errorMsg = errorJson.error.title || errorJson.error.message || errorMsg;
                        }
                    } catch (e) {
                        // ignore
                    }
                    throw new Error(errorMsg);
                }

                const blob = await response.blob();

                // Revoke old result if exists
                if (currentResultUrl) {
                    URL.revokeObjectURL(currentResultUrl);
                }

                currentResultUrl = URL.createObjectURL(blob);

                // Display result
                const img = document.createElement('img');
                img.className = 'preview-image';
                img.src = currentResultUrl;

                dom.resultContainer.innerHTML = '';
                dom.resultContainer.appendChild(img);

                // Complete
                dom.loadingSection.classList.add('hidden');
                dom.actionButtons.classList.remove('hidden');

                console.log('Background removed successfully!');
            }

            // Start initialization when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
